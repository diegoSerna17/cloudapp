<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudApp</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            text-align: center;
            padding-top: 60px;
        }

        .contenedor{
            background: white;
            width: 60%;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        h1{
            color: #0077cc;
        }

        p{
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>Aplicación en la Nube ☁️</h1>

        <p><strong>Estudiante:</strong> Diego Alejandro Serna</p>

        <p>La aplicación está alojada en la nube correctamente.</p>

        <p>Servidor funcionando 24/7 desde internet.</p>

        <p id="fecha"></p>
    </div>

    <script>
        const fecha = new Date();

        document.getElementById("fecha").innerHTML =
            "Fecha y hora: " + fecha;
    </script>

</body>
</html>
